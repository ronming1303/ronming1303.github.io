<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Order Book Imbalance</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f6f8fa; padding: 24px; color: #24292f; }
        .container { max-width: 900px; margin: 0 auto; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { color: #57606a; font-size: 13px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; }
        .stat-label { font-size: 12px; color: #57606a; margin-bottom: 6px; font-weight: 500; }
        .stat-value { font-size: 24px; font-weight: 600; color: #0969da; }
        .stat-sub { font-size: 11px; color: #57606a; margin-top: 4px; }
        .card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        .card-title { font-size: 13px; font-weight: 600; color: #57606a; margin-bottom: 12px; }
        .chart-wrapper { position: relative; height: 280px; }
        .error { color: #d1242f; background: #FFEBE9; padding: 12px; border-radius: 6px; margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <h2>Bitcoin Order Book Imbalance</h2>
    <p class="subtitle">Live order book data from Coinbase BTC/USD (top 10 levels)</p>
    
    <div class="stats-grid" id="stats-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #57606a;">Loading...</div>
    </div>

    <div class="card">
        <div class="card-title">Imbalance Over Time (Last 60 Minutes)</div>
        <div class="chart-wrapper">
            <canvas id="imbalanceChart"></canvas>
        </div>
    </div>

    <div class="error" id="error" style="display: none;"></div>
</div>

<script>
    let chart = null;

    async function loadData() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${today}_btc_usd_d10.csv`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const csvText = await response.text();
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) throw new Error('CSV empty');

            const headers = lines[0].split(',');
            const timeIndex = headers.indexOf('collected_at_utc');
            const imbalanceIndex = headers.indexOf('imbalance');
            
            if (timeIndex === -1 || imbalanceIndex === -1) throw new Error('Missing columns');

            const allPoints = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                const fields = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { fields.push(current); current = ''; }
                    else current += char;
                }
                fields.push(current);
                
                if (fields.length > Math.max(timeIndex, imbalanceIndex)) {
                    const time = new Date(fields[timeIndex].trim());
                    const imbalance = parseFloat(fields[imbalanceIndex].trim());
                    if (!isNaN(imbalance) && !isNaN(time.getTime())) {
                        allPoints.push({ time, imbalance });
                    }
                }
            }

            if (allPoints.length === 0) throw new Error('No data');

            const points = allPoints.slice(-60);
            const latest = points[points.length - 1];
            const imbalances = points.map(p => p.imbalance);
            const mean = imbalances.reduce((a, b) => a + b, 0) / imbalances.length;

            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card"><div class="stat-label">Latest</div><div class="stat-value">${latest.imbalance.toFixed(4)}</div><div class="stat-sub">Mean: ${mean.toFixed(4)}</div></div>
                <div class="stat-card"><div class="stat-label">Range</div><div class="stat-value">${Math.max(...imbalances).toFixed(4)}</div><div class="stat-sub">Min: ${Math.min(...imbalances).toFixed(4)}</div></div>
            `;

            const ctx = document.getElementById('imbalanceChart').getContext('2d');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: points.map(p => p.time),
                    datasets: [{
                        label: 'Imbalance',
                        data: points.map(p => p.imbalance),
                        borderColor: '#0969da',
                        backgroundColor: 'rgba(9, 105, 218, 0.1)',
                        tension: 0.2,
                        fill: true,
                        pointRadius: 2,
                        pointHoverRadius: 4,
                        borderWidth: 1.5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { type: 'time', time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } }, ticks: { font: { size: 11 } } },
                        y: { ticks: { font: { size: 11 } } }
                    }
                }
            });
            
            document.getElementById('error').style.display = 'none';

        } catch (error) {
            document.getElementById('error').textContent = 'Error: ' + error.message;
            document.getElementById('error').style.display = 'block';
        }
    }

    loadData();
    setInterval(loadData, 60 * 1000);
</script>
</body>
</html>
