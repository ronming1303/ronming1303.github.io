<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Microstructure Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #f6f8fa;
            padding: 16px;
        }
        .chart-wrapper { position: relative; height: 350px; margin-bottom: 16px; }
    </style>
</head>
<body>

<div class="chart-wrapper">
    <canvas id="orderBookChart"></canvas>
</div>

<div class="chart-wrapper">
    <canvas id="imbalanceChart"></canvas>
</div>

<script>
    const BID_COLORS = ['#0969da', '#0860c2', '#0859b8', '#0851ae', '#0749a4'];
    const ASK_COLORS = ['#dc3545', '#d02a3b', '#c42231', '#b81927', '#ac111d'];

    async function init() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${today}_btc_usd_d10.csv`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('Failed to fetch');
            
            const csvText = await response.text();
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) throw new Error('No data');

            const headerLine = lines[0].trim();
            const headers = [];
            let current = '';
            let inQuotes = false;
            for (let j = 0; j < headerLine.length; j++) {
                const char = headerLine[j];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { headers.push(current); current = ''; }
                else current += char;
            }
            headers.push(current.trim());
            
            const timeIndex = headers.findIndex(h => h.includes('collected_at_utc'));
            const bidsJsonIndex = headers.findIndex(h => h.includes('bids_json'));
            const asksJsonIndex = headers.findIndex(h => h.includes('asks_json'));
            const imbalanceIndex = headers.findIndex(h => h.includes('imbalance'));
            
            if (timeIndex === -1 || bidsJsonIndex === -1 || asksJsonIndex === -1) throw new Error('Missing');

            const allPoints = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const fields = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    const nextChar = line[j + 1];
                    
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') {
                            current += '"';
                            j++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        fields.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                fields.push(current);
                
                if (fields.length > Math.max(timeIndex, bidsJsonIndex, asksJsonIndex)) {
                    const time = new Date(fields[timeIndex].trim());
                    try {
                        const bidsJson = JSON.parse(fields[bidsJsonIndex]);
                        const asksJson = JSON.parse(fields[asksJsonIndex]);
                        const imbalance = parseFloat(fields[imbalanceIndex]) || 0;
                        
                        if (Array.isArray(bidsJson) && Array.isArray(asksJson) && bidsJson.length > 0 && asksJson.length > 0) {
                            allPoints.push({ 
                                time, 
                                bids: bidsJson,
                                asks: asksJson,
                                imbalance
                            });
                        }
                    } catch (e) {}
                }
            }

            if (allPoints.length === 0) throw new Error('No data');

            const points = allPoints.slice(-60);

            // Prepare datasets
            const bidDatasets = [];
            const askDatasets = [];
            const maxDepth = 5;
            
            for (let depth = 0; depth < maxDepth; depth++) {
                const bidData = points.map(p => ({
                    x: p.time,
                    y: p.bids[depth]?.size || 0
                }));
                
                const askData = points.map(p => ({
                    x: p.time,
                    y: p.asks[depth]?.size || 0
                }));
                
                bidDatasets.push({
                    label: `Bid L${depth + 1}`,
                    data: bidData,
                    borderColor: BID_COLORS[depth],
                    backgroundColor: BID_COLORS[depth].replace(')', ', 0.1)').replace('rgb', 'rgba'),
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    borderWidth: 1.5
                });
                
                askDatasets.push({
                    label: `Ask L${depth + 1}`,
                    data: askData,
                    borderColor: ASK_COLORS[depth],
                    backgroundColor: ASK_COLORS[depth].replace(')', ', 0.1)').replace('rgb', 'rgba'),
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    borderWidth: 1.5
                });
            }

            const xScale = {
                type: 'time',
                ticks: { color: '#57606a', font: { size: 11 } },
                grid: { color: '#d0d7de' }
            };

            new Chart(document.getElementById('orderBookChart'), {
                type: 'line',
                data: { datasets: [...bidDatasets, ...askDatasets] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: true, position: 'top', labels: { boxWidth: 10, font: { size: 11 }, padding: 10 } }
                    },
                    scales: {
                        x: xScale,
                        y: { ticks: { color: '#57606a', font: { size: 11 } }, grid: { color: '#d0d7de' } }
                    }
                }
            });

            new Chart(document.getElementById('imbalanceChart'), {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Imbalance',
                        data: points.map(p => ({ x: p.time, y: p.imbalance })),
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        borderWidth: 1.8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 10, font: { size: 11 }, padding: 10 } } },
                    scales: {
                        x: xScale,
                        y: { ticks: { color: '#57606a', font: { size: 11 } }, grid: { color: '#d0d7de' } }
                    }
                }
            });
        } catch (error) {
            console.error('Error:', error);
        }
    }
    init();
</script>
</body>
</html>
