<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Imbalance Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #ffffff;
            padding: 15px;
        }
        .chart-wrapper {
            position: relative;
            height: 280px;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #57606a;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading...</div>
    <div id="content" style="display: none;">
        <div class="chart-wrapper">
            <canvas id="imbalanceChart"></canvas>
        </div>
    </div>

<script>
    async function init() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${today}_btc_usd_d10.csv`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('Failed to fetch');
            
            const csvText = await response.text();
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) throw new Error('No data');

            const headerLine = lines[0].trim();
            const headers = [];
            let current = '';
            let inQuotes = false;
            for (let j = 0; j < headerLine.length; j++) {
                const char = headerLine[j];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { headers.push(current); current = ''; }
                else current += char;
            }
            headers.push(current.trim());
            
            const timeIndex = headers.findIndex(h => h.includes('collected_at_utc'));
            const bidsJsonIndex = headers.findIndex(h => h.includes('bids_json'));
            const asksJsonIndex = headers.findIndex(h => h.includes('asks_json'));
            
            if (timeIndex === -1 || bidsJsonIndex === -1 || asksJsonIndex === -1) throw new Error('Missing columns');

            const allPoints = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const fields = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    const nextChar = line[j + 1];
                    
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') {
                            // "" is an escaped quote - add single " and skip next
                            current += '"';
                            j++;
                        } else {
                            // Toggle quote state
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        fields.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                fields.push(current);
                
                if (fields.length > Math.max(timeIndex, bidsJsonIndex, asksJsonIndex)) {
                    const time = new Date(fields[timeIndex].trim());
                    try {
                        const bidsJson = JSON.parse(fields[bidsJsonIndex]);
                        const asksJson = JSON.parse(fields[asksJsonIndex]);
                        
                        if (Array.isArray(bidsJson) && Array.isArray(asksJson) && bidsJson.length > 0 && asksJson.length > 0) {
                            allPoints.push({ 
                                time, 
                                bids: bidsJson.slice(0, 10),
                                asks: asksJson.slice(0, 10)
                            });
                        }
                    } catch (e) {
                        // Skip malformed JSON
                    }
                }
            }

            if (allPoints.length === 0) throw new Error('No valid data');

            const points = allPoints.slice(-60);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            const allBidSizes = [];
            const allAskSizes = [];
            points.forEach(p => {
                p.bids.forEach(b => allBidSizes.push(b.size));
                p.asks.forEach(a => allAskSizes.push(a.size));
            });
            const maxSize = Math.max(...allBidSizes, ...allAskSizes);

            new Chart(document.getElementById('imbalanceChart'), {
                type: 'bubble',
                data: {
                    datasets: [
                        {
                            label: 'Bid Orders',
                            data: (() => {
                                const bidData = [];
                                points.forEach(p => {
                                    p.bids.forEach(bid => {
                                        bidData.push({
                                            x: p.time,
                                            y: bid.price,
                                            r: 4,
                                            size: bid.size
                                        });
                                    });
                                });
                                return bidData;
                            })(),
                            backgroundColor: data => `rgba(40, 167, 69, ${0.2 + (data.size / maxSize) * 0.8})`,
                            borderColor: 'rgba(40, 167, 69, 0.2)',
                            borderWidth: 0
                        },
                        {
                            label: 'Ask Orders',
                            data: (() => {
                                const askData = [];
                                points.forEach(p => {
                                    p.asks.forEach(ask => {
                                        askData.push({
                                            x: p.time,
                                            y: ask.price,
                                            r: 4,
                                            size: ask.size
                                        });
                                    });
                                });
                                return askData;
                            })(),
                            backgroundColor: data => `rgba(220, 53, 69, ${0.2 + (data.size / maxSize) * 0.8})`,
                            borderColor: 'rgba(220, 53, 69, 0.2)',
                            borderWidth: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'bottom', labels: { font: { size: 10 } } }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
                            ticks: { color: '#57606a', font: { size: 9 } },
                            grid: { color: '#d0d7de' }
                        },
                        y: {
                            ticks: { color: '#57606a', font: { size: 9 } },
                            grid: { color: '#d0d7de' }
                        }
                    }
                }
            });
                        y: {
                            ticks: { color: '#57606a', font: { size: 9 } },
                            grid: { color: '#d0d7de' }
                        }
                    }
                }
            });
        } catch (error) {
            document.getElementById('loading').textContent = 'Failed to load data';
        }
    }
    init();
</script>
</body>
</html>
