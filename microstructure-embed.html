<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Order Book Imbalance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #f6f8fa;
            padding: 24px;
            color: #24292f;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { color: #57606a; font-size: 13px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; }
        .stat-label { font-size: 12px; color: #57606a; margin-bottom: 6px; font-weight: 500; }
        .stat-value { font-size: 24px; font-weight: 600; color: #0969da; }
        .stat-sub { font-size: 11px; color: #57606a; margin-top: 4px; }
        .card {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card-title { font-size: 13px; font-weight: 600; color: #57606a; margin-bottom: 12px; }
        .chart-wrapper { position: relative; height: 280px; }
        .loading { text-align: center; padding: 40px; color: #57606a; }
        .error { color: #d1242f; background: #FFEBE9; padding: 12px; border-radius: 6px; margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <h2>Bitcoin Order Book Imbalance</h2>
    <p class="subtitle">Live order book data from Coinbase BTC/USD (top 10 levels)</p>
    
    <div class="stats-grid" id="stats-grid">
        <div class="loading">Loading data...</div>
    </div>

    <div class="card">
        <div class="card-title">Imbalance Over Time (Today's Minutes)</div>
        <div class="chart-wrapper">
            <canvas id="imbalanceChart"></canvas>
        </div>
    </div>

    <div class="error" id="error" style="display: none;"></div>
</div>

<script>
    let chart = null;

    async function loadData() {
        try {
            // Try to fetch latest minute data
            let csvText = null;
            let today = new Date().toISOString().split('T')[0];
            
            // Try today's file first, then yesterday if today's doesn't exist
            for (let daysBack = 0; daysBack < 3; daysBack++) {
                const date = new Date();
                date.setDate(date.getDate() - daysBack);
                const dateStr = date.toISOString().split('T')[0];
                const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${dateStr}_btc_usd_d10.csv`;
                
                try {
                    const response = await fetch(csvUrl);
                    if (response.ok) {
                        csvText = await response.text();
                        break;
                    }
                } catch (e) {
                    // Try next date
                    continue;
                }
            }
            
            if (!csvText) throw new Error('No minute data files found');
            
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) {
                throw new Error('CSV file is empty');
            }

            // Parse CSV
            const points = [];
            const headers = lines[0].split(',');
            const timeIndex = headers.indexOf('collected_at_utc');
            const imbalanceIndex = headers.indexOf('imbalance');
            
            if (timeIndex === -1 || imbalanceIndex === -1) {
                throw new Error('Missing required columns in CSV');
            }
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',');
                if (values.length > Math.max(timeIndex, imbalanceIndex)) {
                    const time = new Date(values[timeIndex]);
                    const imbalance = parseFloat(values[imbalanceIndex]);
                    if (!isNaN(imbalance) && !isNaN(time.getTime())) {
                        points.push({ time, imbalance });
                    }
                }
            }
            
            if (points.length === 0) {
                throw new Error('No valid data points');
            }

            // Keep only last 60 minutes
            const maxPoints = 60;
            if (points.length > maxPoints) {
                points = points.slice(-maxPoints);
            }

            // Get latest and statistics
            const latest = points[points.length - 1];
            const imbalances = points.map(p => p.imbalance);
            const mean = imbalances.reduce((a, b) => a + b, 0) / imbalances.length;
            const sorted = [...imbalances].sort((a, b) => a - b);
            const median = sorted.length % 2 === 0 
                ? (sorted[sorted.length / 2 - 1] + sorted[sorted.length / 2]) / 2 
                : sorted[Math.floor(sorted.length / 2)];
            const min = Math.min(...imbalances);
            const max = Math.max(...imbalances);
            
            // Update stats
            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-label">Latest Imbalance</div>
                    <div class="stat-value">${latest.imbalance.toFixed(4)}</div>
                    <div class="stat-sub">Mean: ${mean.toFixed(4)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Imbalance Range</div>
                    <div class="stat-value">${max.toFixed(4)}</div>
                    <div class="stat-sub">Min: ${min.toFixed(4)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Samples</div>
                    <div class="stat-value">${points.length}</div>
                    <div class="stat-sub">Today's minutes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Last Updated</div>
                    <div class="stat-value" style="font-size: 14px;">${latest.time.toLocaleTimeString()}</div>
                    <div class="stat-sub">${latest.time.toLocaleDateString()}</div>
                </div>
            `;
            document.getElementById('stats-grid').innerHTML = statsHtml;

            // Prepare chart data
            const labels = points.map(p => p.time);
            const imbalanceData = points.map(p => p.imbalance);

            // Create chart
            const ctx = document.getElementById('imbalanceChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Minute-level Imbalance',
                            data: imbalanceData,
                            borderColor: '#0969da',
                            backgroundColor: 'rgba(9, 105, 218, 0.1)',
                            tension: 0.1,
                            fill: true,
                            pointRadius: 2,
                            pointHoverRadius: 4,
                            borderWidth: 1.5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                font: { size: 12 },
                                padding: 15,
                                boxWidth: 12
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'hour',
                                displayFormats: {
                                    hour: 'HH:mm'
                                }
                            },
                            ticks: {
                                font: { size: 11 }
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Imbalance Index',
                                font: { size: 12 }
                            },
                            ticks: {
                                font: { size: 11 }
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        }
                    }
                }
            });

        } catch (error) {
            console.error('Error loading data:', error);
            document.getElementById('error').textContent = 'Error loading data: ' + error.message;
            document.getElementById('error').style.display = 'block';
            document.getElementById('stats-grid').innerHTML = '<div style="color: #d1242f;">Failed to load data</div>';
        }
    }

    // Load data on page load and refresh every minute
    loadData();
    setInterval(loadData, 60 * 1000);
</script>
</body>
</html>
