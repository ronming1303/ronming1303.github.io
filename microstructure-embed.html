<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Microstructure Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #f6f8fa;
            padding: 24px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { color: #57606a; font-size: 13px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 12px 16px; }
        .stat-label { font-size: 11px; color: #57606a; margin-bottom: 4px; }
        .stat-value { font-size: 18px; font-weight: 600; }
        .stat-sub { font-size: 10px; color: #57606a; margin-top: 2px; }
        .card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        .card-title { font-size: 13px; font-weight: 600; color: #57606a; margin-bottom: 12px; }
        .chart-wrapper { position: relative; height: 350px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Bitcoin Order Book Imbalance</h2>
    <p class="subtitle">Last 60 minutes of order book dynamics</p>
    
    <div id="stats-grid" class="stats-grid"></div>

    <div class="card">
        <div class="card-title">Order Book Depth Evolution</div>
        <div class="chart-wrapper">
            <canvas id="orderBookChart"></canvas>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Bid-Ask Imbalance</div>
        <div class="chart-wrapper">
            <canvas id="imbalanceChart"></canvas>
        </div>
    </div>
</div>

<script>
    function formatPrice(price) {
        return '$' + Math.round(price).toLocaleString();
    }

    async function init() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${today}_btc_usd_d10.csv`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('Failed to fetch');
            
            const csvText = await response.text();
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) throw new Error('No data');

            const headerLine = lines[0].trim();
            const headers = [];
            let current = '';
            let inQuotes = false;
            for (let j = 0; j < headerLine.length; j++) {
                const char = headerLine[j];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { headers.push(current); current = ''; }
                else current += char;
            }
            headers.push(current.trim());
            
            const timeIndex = headers.findIndex(h => h.includes('collected_at_utc'));
            const bidsJsonIndex = headers.findIndex(h => h.includes('bids_json'));
            const asksJsonIndex = headers.findIndex(h => h.includes('asks_json'));
            const bestBidIndex = headers.findIndex(h => h.includes('best_bid'));
            const bestAskIndex = headers.findIndex(h => h.includes('best_ask'));
            const imbalanceIndex = headers.findIndex(h => h.includes('imbalance'));
            
            if (timeIndex === -1 || bidsJsonIndex === -1 || asksJsonIndex === -1) throw new Error('Missing columns');

            const allPoints = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const fields = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    const nextChar = line[j + 1];
                    
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') {
                            current += '"';
                            j++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        fields.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                fields.push(current);
                
                if (fields.length > Math.max(timeIndex, bidsJsonIndex, asksJsonIndex)) {
                    const time = new Date(fields[timeIndex].trim());
                    try {
                        const bidsJson = JSON.parse(fields[bidsJsonIndex]);
                        const asksJson = JSON.parse(fields[asksJsonIndex]);
                        const bestBid = parseFloat(fields[bestBidIndex]);
                        const bestAsk = parseFloat(fields[bestAskIndex]);
                        const imbalance = parseFloat(fields[imbalanceIndex]) || 0;
                        
                        if (Array.isArray(bidsJson) && Array.isArray(asksJson) && bidsJson.length > 0 && asksJson.length > 0) {
                            allPoints.push({ 
                                time, 
                                bids: bidsJson,
                                asks: asksJson,
                                bestBid,
                                bestAsk,
                                imbalance
                            });
                        }
                    } catch (e) {}
                }
            }

            if (allPoints.length === 0) throw new Error('No valid data');

            const points = allPoints.slice(-60);
            
            // Render stats
            if (points.length > 0) {
                const latest = points[points.length - 1];
                const statCards = [
                    { label: 'Best Bid', value: formatPrice(latest.bestBid), sub: 'highest buy' },
                    { label: 'Best Ask', value: formatPrice(latest.bestAsk), sub: 'lowest sell' },
                    { label: 'Imbalance', value: latest.imbalance.toFixed(4), sub: 'latest' }
                ];
                
                const grid = document.getElementById('stats-grid');
                statCards.forEach(stat => {
                    const div = document.createElement('div');
                    div.className = 'stat-card';
                    div.innerHTML = `<div class="stat-label">${stat.label}</div><div class="stat-value">${stat.value}</div><div class="stat-sub">${stat.sub}</div>`;
                    grid.appendChild(div);
                });
            }

            // Prepare data for order book chart
            const bidDatasets = [];
            const askDatasets = [];
            const maxDepth = 10;
            
            for (let depth = 0; depth < maxDepth; depth++) {
                const bidData = points.map(p => ({
                    x: p.time,
                    y: p.bids[depth]?.price || null,
                    r: (p.bids[depth]?.size || 0) * 100
                })).filter(d => d.y !== null);
                
                const askData = points.map(p => ({
                    x: p.time,
                    y: p.asks[depth]?.price || null,
                    r: (p.asks[depth]?.size || 0) * 100
                })).filter(d => d.y !== null);
                
                if (bidData.length > 0) {
                    bidDatasets.push({
                        label: `Bid L${depth + 1}`,
                        data: bidData,
                        backgroundColor: `rgba(9, 105, 218, ${0.3 + depth * 0.05})`,
                        borderColor: `rgba(9, 105, 218, 1)`,
                        borderWidth: 0,
                        pointRadius: 0
                    });
                }
                
                if (askData.length > 0) {
                    askDatasets.push({
                        label: `Ask L${depth + 1}`,
                        data: askData,
                        backgroundColor: `rgba(220, 53, 69, ${0.3 + depth * 0.05})`,
                        borderColor: `rgba(220, 53, 69, 1)`,
                        borderWidth: 0,
                        pointRadius: 0
                    });
                }
            }

            new Chart(document.getElementById('orderBookChart'), {
                type: 'bubble',
                data: { datasets: [...bidDatasets, ...askDatasets] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'top', labels: { boxWidth: 6, font: { size: 9 }, padding: 6, usePointStyle: true } }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
                            ticks: { color: '#57606a', font: { size: 9 } },
                            grid: { color: '#d0d7de' }
                        },
                        y: {
                            ticks: { color: '#57606a', font: { size: 9 }, callback: v => formatPrice(v) },
                            grid: { color: '#d0d7de' }
                        }
                    }
                }
            });

            new Chart(document.getElementById('imbalanceChart'), {
                type: 'line',
                data: {
                    labels: points.map(p => p.time),
                    datasets: [{
                        label: 'Imbalance',
                        data: points.map(p => p.imbalance),
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
                            ticks: { color: '#57606a', font: { size: 9 } },
                            grid: { color: '#d0d7de' }
                        },
                        y: {
                            ticks: { color: '#57606a', font: { size: 9 } },
                            grid: { color: '#d0d7de' }
                        }
                    }
                }
            });
        } catch (error) {
            console.error('Error:', error);
        }
    }
    init();
</script>
</body>
</html>
