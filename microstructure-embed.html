<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Order Book Imbalance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #f6f8fa;
            padding: 24px;
            color: #24292f;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { color: #57606a; font-size: 13px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; }
        .stat-label { font-size: 12px; color: #57606a; margin-bottom: 6px; font-weight: 500; }
        .stat-value { font-size: 24px; font-weight: 600; color: #0969da; }
        .stat-sub { font-size: 11px; color: #57606a; margin-top: 4px; }
        .card {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card-title { font-size: 13px; font-weight: 600; color: #57606a; margin-bottom: 12px; }
        .chart-wrapper { position: relative; height: 280px; }
        .loading { text-align: center; padding: 40px; color: #57606a; }
        .error { color: #d1242f; background: #FFEBE9; padding: 12px; border-radius: 6px; margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <h2>Bitcoin Order Book Imbalance</h2>
    <p class="subtitle">Live order book data from Coinbase BTC/USD (top 10 levels)</p>
    
    <div class="stats-grid" id="stats-grid">
        <div class="loading">Loading data...</div>
    </div>

    <div class="card">
        <div class="card-title">Imbalance Over Time (Last 24 Hours)</div>
        <div class="chart-wrapper">
            <canvas id="imbalanceChart"></canvas>
        </div>
    </div>

    <div class="error" id="error" style="display: none;"></div>
</div>

<script>
    let chart = null;

    async function loadData() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/public/data/imbalance_hourly_tail.json');
            if (!response.ok) throw new Error('Failed to fetch data');
            
            const data = await response.json();
            const points = data.points || [];
            
            if (points.length === 0) {
                throw new Error('No data points available');
            }

            // Get latest data
            const latest = points[points.length - 1];
            
            // Update stats
            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-label">Latest Mean Imbalance</div>
                    <div class="stat-value">${latest.imbalance_mean.toFixed(4)}</div>
                    <div class="stat-sub">Median: ${latest.imbalance_median.toFixed(4)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Imbalance Range</div>
                    <div class="stat-value">${latest.imbalance_max.toFixed(4)}</div>
                    <div class="stat-sub">Min: ${latest.imbalance_min.toFixed(4)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Samples</div>
                    <div class="stat-value">${latest.successful_samples}</div>
                    <div class="stat-sub">Last hour</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Last Updated</div>
                    <div class="stat-value" style="font-size: 14px;">${new Date(latest.window_end_utc).toLocaleTimeString()}</div>
                    <div class="stat-sub">${new Date(latest.window_end_utc).toLocaleDateString()}</div>
                </div>
            `;
            document.getElementById('stats-grid').innerHTML = statsHtml;

            // Prepare chart data
            const labels = points.map(p => new Date(p.window_end_utc));
            const meanData = points.map(p => p.imbalance_mean);
            const medianData = points.map(p => p.imbalance_median);

            // Create chart
            const ctx = document.getElementById('imbalanceChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Mean Imbalance',
                            data: meanData,
                            borderColor: '#0969da',
                            backgroundColor: 'rgba(9, 105, 218, 0.1)',
                            tension: 0.3,
                            fill: true,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            borderWidth: 2
                        },
                        {
                            label: 'Median Imbalance',
                            data: medianData,
                            borderColor: '#d29922',
                            backgroundColor: 'transparent',
                            tension: 0.3,
                            fill: false,
                            pointRadius: 3,
                            pointHoverRadius: 5,
                            borderWidth: 2,
                            borderDash: [5, 5]
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                font: { size: 12 },
                                padding: 15,
                                boxWidth: 12
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'hour',
                                displayFormats: {
                                    hour: 'MMM d, HH:mm'
                                }
                            },
                            ticks: {
                                font: { size: 11 }
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Imbalance Index',
                                font: { size: 12 }
                            },
                            ticks: {
                                font: { size: 11 }
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        }
                    }
                }
            });

        } catch (error) {
            console.error('Error loading data:', error);
            document.getElementById('error').textContent = 'Error loading data: ' + error.message;
            document.getElementById('error').style.display = 'block';
            document.getElementById('stats-grid').innerHTML = '<div style="color: #d1242f;">Failed to load data</div>';
        }
    }

    // Load data on page load and refresh every 5 minutes
    loadData();
    setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
