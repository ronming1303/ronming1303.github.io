<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Microstructure Heatmap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #ffffff;
            padding: 15px;
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #57606a;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading...</div>
    <div id="content" style="display: none;">
        <div class="chart-wrapper">
            <canvas id="imbalanceChart"></canvas>
        </div>
    </div>

<script>
    async function init() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${today}_btc_usd_d10.csv`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('Failed to fetch');
            
            const csvText = await response.text();
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) throw new Error('No data');

            const headerLine = lines[0].trim();
            const headers = [];
            let current = '';
            let inQuotes = false;
            for (let j = 0; j < headerLine.length; j++) {
                const char = headerLine[j];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { headers.push(current); current = ''; }
                else current += char;
            }
            headers.push(current.trim());
            
            const timeIndex = headers.findIndex(h => h.includes('collected_at_utc'));
            const bidsJsonIndex = headers.findIndex(h => h.includes('bids_json'));
            const asksJsonIndex = headers.findIndex(h => h.includes('asks_json'));
            
            if (timeIndex === -1 || bidsJsonIndex === -1 || asksJsonIndex === -1) throw new Error('Missing columns');

            const allPoints = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const fields = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    const nextChar = line[j + 1];
                    
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') {
                            current += '"';
                            j++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        fields.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                fields.push(current);
                
                if (fields.length > Math.max(timeIndex, bidsJsonIndex, asksJsonIndex)) {
                    const time = new Date(fields[timeIndex].trim());
                    try {
                        const bidsJson = JSON.parse(fields[bidsJsonIndex]);
                        const asksJson = JSON.parse(fields[asksJsonIndex]);
                        
                        if (Array.isArray(bidsJson) && Array.isArray(asksJson) && bidsJson.length > 0 && asksJson.length > 0) {
                            allPoints.push({ 
                                time, 
                                bids: bidsJson.slice(0, 10),
                                asks: asksJson.slice(0, 10)
                            });
                        }
                    } catch (e) {
                        // Skip malformed JSON
                    }
                }
            }

            if (allPoints.length === 0) throw new Error('No valid data');

            const points = allPoints.slice(-60);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            // Draw heatmap
            const canvas = document.getElementById('imbalanceChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            const padding = { top: 40, bottom: 30, left: 80, right: 20 };
            const graphWidth = canvas.width - padding.left - padding.right;
            const graphHeight = canvas.height - padding.top - padding.bottom;
            
            // Calculate max size for normalization
            let maxBidSize = 0, maxAskSize = 0;
            points.forEach(p => {
                p.bids.forEach(b => maxBidSize = Math.max(maxBidSize, b.size));
                p.asks.forEach(a => maxAskSize = Math.max(maxAskSize, a.size));
            });
            
            const DEPTH_LEVELS = 10;
            const rectWidth = graphWidth / points.length;
            const rectHeight = graphHeight / (DEPTH_LEVELS * 2);
            
            // Draw background
            ctx.fillStyle = '#f6f8fa';
            ctx.fillRect(padding.left, padding.top, graphWidth, graphHeight);
            
            // Draw grid
            ctx.strokeStyle = '#e1e4e8';
            ctx.lineWidth = 1;
            for (let i = 0; i <= DEPTH_LEVELS * 2; i++) {
                const y = padding.top + i * rectHeight;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(padding.left + graphWidth, y);
                ctx.stroke();
            }
            
            // Draw rectangles
            points.forEach((p, timeIdx) => {
                const x0 = padding.left + timeIdx * rectWidth;
                
                // Draw Bids
                p.bids.forEach((bid, bidIdx) => {
                    const y = padding.top + bidIdx * rectHeight;
                    const normalized = Math.min(bid.size / maxBidSize, 1);
                    const alpha = Math.max(0.1 + normalized * 0.9, 0.1);
                    ctx.fillStyle = `rgba(9, 105, 218, ${alpha})`;
                    ctx.fillRect(x0, y, rectWidth - 0.5, rectHeight - 0.5);
                });
                
                // Draw Asks
                p.asks.forEach((ask, askIdx) => {
                    const y = padding.top + (DEPTH_LEVELS + askIdx) * rectHeight;
                    const normalized = Math.min(ask.size / maxAskSize, 1);
                    const alpha = Math.max(0.1 + normalized * 0.9, 0.1);
                    ctx.fillStyle = `rgba(220, 53, 69, ${alpha})`;
                    ctx.fillRect(x0, y, rectWidth - 0.5, rectHeight - 0.5);
                });
            });
            
            // Draw axes
            ctx.strokeStyle = '#24292f';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding.left, padding.top);
            ctx.lineTo(padding.left, padding.top + graphHeight);
            ctx.lineTo(padding.left + graphWidth, padding.top + graphHeight);
            ctx.stroke();
            
            // Draw depth labels and title
            ctx.fillStyle = '#0969da';
            ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, "Segoe UI"';
            ctx.textAlign = 'center';
            ctx.fillText('BIDS', padding.left / 2, padding.top / 2 - 5);
            
            ctx.fillStyle = '#dc3545';
            ctx.fillText('ASKS', padding.left / 2, padding.top + graphHeight / 2);
            
            ctx.fillStyle = '#0969da';
            ctx.font = '10px -apple-system, BlinkMacSystemFont, "Segoe UI"';
            ctx.textAlign = 'right';
            for (let i = 0; i < DEPTH_LEVELS; i++) {
                const y = padding.top + (i + 0.5) * rectHeight;
                ctx.fillText(`L${i + 1}`, padding.left - 10, y + 4);
            }
            
            ctx.fillStyle = '#dc3545';
            for (let i = 0; i < DEPTH_LEVELS; i++) {
                const y = padding.top + (DEPTH_LEVELS + i + 0.5) * rectHeight;
                ctx.fillText(`L${i + 1}`, padding.left - 10, y + 4);
            }
            
            // Draw title
            ctx.fillStyle = '#24292f';
            ctx.font = 'bold 14px -apple-system, BlinkMacSystemFont, "Segoe UI"';
            ctx.textAlign = 'left';
            ctx.fillText('Order Book Heatmap (Last 60 minutes)', padding.left, 20);
        } catch (error) {
            document.getElementById('loading').textContent = 'Error: ' + error.message;
        }
    }
    init();
</script>
</body>
</html>
