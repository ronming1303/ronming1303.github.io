<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Imbalance Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #ffffff;
            padding: 15px;
        }
        .chart-wrapper {
            position: relative;
            height: 280px;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #57606a;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading...</div>
    <div id="content" style="display: none;">
        <div class="chart-wrapper">
            <canvas id="imbalanceChart"></canvas>
        </div>
    </div>

<script>
    async function init() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${today}_btc_usd_d10.csv`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('Failed to fetch');
            
            const csvText = await response.text();
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) throw new Error('No data');

            const headers = lines[0].split(',');
            const timeIndex = headers.indexOf('collected_at_utc');
            const bidVolumeIndex = headers.indexOf('bid_volume');
            const askVolumeIndex = headers.indexOf('ask_volume');
            const imbalanceIndex = headers.indexOf('imbalance');
            const bestBidIndex = headers.indexOf('best_bid');
            const bestAskIndex = headers.indexOf('best_ask');
            const midPriceIndex = headers.indexOf('mid_price');
            
            if (timeIndex === -1 || imbalanceIndex === -1 || bidVolumeIndex === -1) throw new Error('Missing columns');

            const allPoints = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                const fields = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { fields.push(current); current = ''; }
                    else current += char;
                }
                fields.push(current);
                
                if (fields.length > Math.max(timeIndex, imbalanceIndex, bidVolumeIndex, askVolumeIndex, bestBidIndex, bestAskIndex)) {
                    const time = new Date(fields[timeIndex].trim());
                    const bidVol = parseFloat(fields[bidVolumeIndex].trim());
                    const askVol = parseFloat(fields[askVolumeIndex].trim());
                    const imbalance = parseFloat(fields[imbalanceIndex].trim());
                    const bestBid = parseFloat(fields[bestBidIndex].trim());
                    const bestAsk = parseFloat(fields[bestAskIndex].trim());
                    const midPrice = parseFloat(fields[midPriceIndex].trim());
                    
                    if (!isNaN(imbalance) && !isNaN(time.getTime())) {
                        allPoints.push({ time, bidVol, askVol, imbalance, bestBid, bestAsk, midPrice });
                    }
                }
            }

            if (allPoints.length === 0) throw new Error('No valid data');

            const points = allPoints.slice(-60);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            new Chart(document.getElementById('imbalanceChart'), {
                type: 'bar',
                data: {
                    labels: points.map(p => p.time),
                    datasets: [
                        {
                            label: 'Bid Volume',
                            data: points.map(p => p.bidVol),
                            type: 'bar',
                            backgroundColor: 'rgba(40, 167, 69, 0.4)',
                            borderWidth: 0,
                            barThickness: 4,
                            yAxisID: 'y1'
                        },
                        {
                            label: 'Ask Volume',
                            data: points.map(p => p.askVol),
                            type: 'bar',
                            backgroundColor: 'rgba(220, 53, 69, 0.4)',
                            borderWidth: 0,
                            barThickness: 4,
                            yAxisID: 'y1'
                        },
                        {
                            label: 'Best Bid',
                            data: points.map(p => p.bestBid),
                            type: 'line',
                            borderColor: '#28a745',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.2,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Best Ask',
                            data: points.map(p => p.bestAsk),
                            type: 'line',
                            borderColor: '#dc3545',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.2,
                            yAxisID: 'y'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: true, position: 'bottom', labels: { font: { size: 10 } } }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
                            ticks: { color: '#57606a', font: { size: 9 } },
                            grid: { color: '#d0d7de' }
                        },
                        y: {
                            type: 'linear',
                            position: 'left',
                            ticks: { color: '#57606a', font: { size: 9 } },
                            grid: { color: '#d0d7de' }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            ticks: { color: '#57606a', font: { size: 9 } },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        } catch (error) {
            document.getElementById('loading').textContent = 'Failed to load data';
        }
    }
    init();
</script>
</body>
</html>
