<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Exchange Price Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #ffffff;
            padding: 15px;
        }
        .chart-wrapper { position: relative; height: 260px; }
        .loading { text-align: center; padding: 50px; color: #57606a; }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading...</div>
    <div id="content" style="display: none;">
        <div class="chart-wrapper">
            <canvas id="priceChart"></canvas>
        </div>
    </div>
    <script type="module">
        import { asyncBufferFromUrl, parquetRead } from 'https://esm.sh/hyparquet@1';

        const EXCHANGES = ['binance', 'bybit', 'coinbase', 'kraken', 'okx', 'bitfinex'];
        const COLORS = ['#F0B90B', '#F7A600', '#0052FF', '#5741D9', '#1a1a1a', '#16B157'];
        const PAIR = 'btc_usdt';
        const BASE_URL = 'https://raw.githubusercontent.com/ronming1303/CryptoExchange_Pipeline/main/data/raw';

        function getDateStr(daysBack = 0) {
            const d = new Date();
            d.setUTCDate(d.getUTCDate() - daysBack);
            return d.toISOString().split('T')[0];
        }

        async function findLatestDate() {
            for (let i = 0; i < 4; i++) {
                const date = getDateStr(i);
                const url = `${BASE_URL}/${date}/binance_${PAIR}.parquet`;
                try {
                    const resp = await fetch(url, { method: 'HEAD' });
                    if (resp.ok) return date;
                } catch (_) {}
            }
            return null;
        }

        async function readParquet(url) {
            const buf = await asyncBufferFromUrl(url);
            return new Promise((resolve, reject) => {
                parquetRead({
                    file: buf,
                    columns: ['timestamp', 'close'],
                    onComplete: resolve
                }).catch(reject);
            });
        }

        async function init() {
            try {
                const date = await findLatestDate();
                if (!date) throw new Error('No data found');

                const results = await Promise.all(
                    EXCHANGES.map(ex =>
                        readParquet(`${BASE_URL}/${date}/${ex}_${PAIR}.parquet`)
                    )
                );

                const datasets = results.map((rows, i) => {
                    rows.sort((a, b) => new Date(a[0]) - new Date(b[0]));
                    const name = EXCHANGES[i];
                    return {
                        label: name.charAt(0).toUpperCase() + name.slice(1),
                        data: rows.map(r => ({ x: new Date(r[0]), y: r[1] })),
                        borderColor: COLORS[i],
                        backgroundColor: 'transparent',
                        tension: 0.3,
                        pointRadius: 0,
                        borderWidth: 1.8
                    };
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                new Chart(document.getElementById('priceChart'), {
                    type: 'line',
                    data: { datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: { boxWidth: 10, font: { size: 10 }, padding: 8 }
                            },
                            tooltip: {
                                callbacks: {
                                    label: ctx => `${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString()}`
                                }
                            }
                        },
                        scales: {
                            x: {
                                type: 'time',
                                time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
                                ticks: { color: '#57606a', font: { size: 10 } },
                                grid: { color: '#d0d7de' }
                            },
                            y: {
                                ticks: {
                                    color: '#57606a',
                                    font: { size: 10 },
                                    callback: v => '$' + v.toLocaleString()
                                },
                                grid: { color: '#d0d7de' }
                            }
                        }
                    }
                });
            } catch (error) {
                document.getElementById('loading').textContent = 'Failed to load data';
            }
        }
        init();
    </script>
</body>
</html>
