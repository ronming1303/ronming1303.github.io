<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Exchange Price Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #ffffff;
            padding: 15px;
        }
        .chart-wrapper { position: relative; height: 260px; }
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #57606a;
            font-size: 13px;
            text-align: center;
            pointer-events: none;
        }
        .wrapper { position: relative; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div id="status">Loading...</div>
        <div class="chart-wrapper">
            <canvas id="priceChart"></canvas>
        </div>
    </div>
    <script type="module">
        import { parquetRead } from 'https://esm.sh/hyparquet@1';

        const EXCHANGES = ['binance', 'bybit', 'coinbase', 'kraken', 'okx', 'bitfinex'];
        const COLORS = ['#F0B90B', '#F7A600', '#0052FF', '#5741D9', '#555', '#16B157'];
        const PAIR = 'btc_usdt';
        const BASE_URL = 'https://raw.githubusercontent.com/ronming1303/CryptoExchange_Pipeline/main/data/raw';

        function getDateStr(daysBack = 0) {
            const d = new Date();
            d.setUTCDate(d.getUTCDate() - daysBack);
            return d.toISOString().split('T')[0];
        }

        function toDate(ts) {
            if (ts instanceof Date) return ts;
            if (typeof ts === 'bigint') return new Date(Number(ts) / 1000);
            return new Date(ts);
        }

        async function findLatestDate() {
            for (let i = 0; i < 5; i++) {
                const date = getDateStr(i);
                try {
                    const r = await fetch(`${BASE_URL}/${date}/binance_${PAIR}.parquet`, { method: 'HEAD' });
                    if (r.ok) return date;
                } catch (_) {}
            }
            return null;
        }

        async function readParquet(url) {
            const ab = await fetch(url).then(r => r.arrayBuffer());
            const file = {
                byteLength: ab.byteLength,
                slice: (s, e) => Promise.resolve(ab.slice(s, e))
            };
            return new Promise((resolve, reject) => {
                parquetRead({ file, rowFormat: 'object', onComplete: resolve }).catch(reject);
            });
        }

        async function init() {
            try {
                const date = await findLatestDate();
                if (!date) throw new Error('no data');

                const allRows = await Promise.all(
                    EXCHANGES.map(ex => readParquet(`${BASE_URL}/${date}/${ex}_${PAIR}.parquet`))
                );

                const datasets = allRows.map((rows, i) => {
                    rows.sort((a, b) => toDate(a.timestamp) - toDate(b.timestamp));
                    return {
                        label: EXCHANGES[i][0].toUpperCase() + EXCHANGES[i].slice(1),
                        data: rows.map(r => ({ x: toDate(r.timestamp), y: r.close })),
                        borderColor: COLORS[i],
                        backgroundColor: 'transparent',
                        tension: 0.3,
                        pointRadius: 0,
                        borderWidth: 1.8
                    };
                });

                document.getElementById('status').style.display = 'none';

                new Chart(document.getElementById('priceChart'), {
                    type: 'line',
                    data: { datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: { boxWidth: 10, font: { size: 10 }, padding: 8 }
                            },
                            tooltip: {
                                callbacks: {
                                    label: ctx => `${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString()}`
                                }
                            }
                        },
                        scales: {
                            x: {
                                type: 'time',
                                time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
                                ticks: { color: '#57606a', font: { size: 10 } },
                                grid: { color: '#d0d7de' }
                            },
                            y: {
                                ticks: {
                                    color: '#57606a',
                                    font: { size: 10 },
                                    callback: v => '$' + v.toLocaleString()
                                },
                                grid: { color: '#d0d7de' }
                            }
                        }
                    }
                });
            } catch (err) {
                document.getElementById('status').textContent = 'Error: ' + err.message;
            }
        }
        init();
    </script>
</body>
</html>
