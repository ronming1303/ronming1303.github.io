<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Order Book Imbalance Dashboard - Ruming Liu</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #f6f8fa;
            color: #24292f;
            padding: 24px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { margin-bottom: 30px; }
        h1 { color: #0969da; font-size: 1.8em; margin-bottom: 10px; }
        .subtitle { color: #57606a; font-size: 0.95em; margin-bottom: 20px; }
        .back-link { color: #0969da; text-decoration: none; font-size: 0.9em; display: inline-block; margin-bottom: 20px; }
        .back-link:hover { text-decoration: underline; }
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 12px 16px; }
        .stat-label { font-size: 11px; color: #57606a; margin-bottom: 4px; font-weight: 500; }
        .stat-value { font-size: 18px; font-weight: 600; color: #0969da; }
        .stat-sub { font-size: 10px; color: #57606a; margin-top: 2px; }
        .card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        .card-title { font-size: 13px; font-weight: 600; color: #57606a; margin-bottom: 12px; }
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
        .chart-wrapper { position: relative; height: 400px; }
        .error { color: #d1242f; background: #FFEBE9; padding: 12px; border-radius: 6px; margin: 20px 0; }
        footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #d0d7de; color: #57606a; font-size: 0.85em; }
        footer a { color: #0969da; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <a href="/" class="back-link">&larr; Back to Home</a>
        <h1>Bitcoin Order Book Imbalance</h1>
        <p class="subtitle">Last 60 minutes of order book dynamics and sentiment</p>
    </header>

    <div id="stats-grid" class="stats-grid"></div>

    <div class="charts-grid">
        <div class="card">
            <div class="card-title">Order Book Depth Evolution (Last 60 Minutes)</div>
            <div class="chart-wrapper">
                <canvas id="orderBookChart"></canvas>
            </div>
        </div>
        <div class="card">
            <div class="card-title">Bid-Ask Imbalance</div>
            <div class="chart-wrapper">
                <canvas id="imbalanceChart"></canvas>
            </div>
        </div>
    </div>

    <div id="error" class="error" style="display: none;"></div>

    <footer>
        <p>Data source: <a href="https://github.com/ronming1303/Microstructure_Pipeline" target="_blank">Microstructure Pipeline</a></p>
    </footer>
</div>

<script>
    function formatPrice(price) {
        return '$' + Math.round(price).toLocaleString();
    }

    async function init() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${today}_btc_usd_d10.csv`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('Failed to fetch CSV data');
            
            const csvText = await response.text();
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) throw new Error('No data');

            const headerLine = lines[0].trim();
            const headers = [];
            let current = '';
            let inQuotes = false;
            for (let j = 0; j < headerLine.length; j++) {
                const char = headerLine[j];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { headers.push(current); current = ''; }
                else current += char;
            }
            headers.push(current.trim());
            
            const timeIndex = headers.findIndex(h => h.includes('collected_at_utc'));
            const bidsJsonIndex = headers.findIndex(h => h.includes('bids_json'));
            const asksJsonIndex = headers.findIndex(h => h.includes('asks_json'));
            const bestBidIndex = headers.findIndex(h => h.includes('best_bid'));
            const bestAskIndex = headers.findIndex(h => h.includes('best_ask'));
            const imbalanceIndex = headers.findIndex(h => h.includes('imbalance'));
            
            if (timeIndex === -1 || bidsJsonIndex === -1 || asksJsonIndex === -1) throw new Error('Missing required columns');

            const allPoints = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const fields = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    const nextChar = line[j + 1];
                    
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') {
                            current += '"';
                            j++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        fields.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                fields.push(current);
                
                if (fields.length > Math.max(timeIndex, bidsJsonIndex, asksJsonIndex)) {
                    try {
                        const time = new Date(fields[timeIndex].trim());
                        const bidsJson = JSON.parse(fields[bidsJsonIndex]);
                        const asksJson = JSON.parse(fields[asksJsonIndex]);
                        const bestBid = parseFloat(fields[bestBidIndex]);
                        const bestAsk = parseFloat(fields[bestAskIndex]);
                        const imbalance = parseFloat(fields[imbalanceIndex]) || 0;
                        
                        if (Array.isArray(bidsJson) && Array.isArray(asksJson) && bidsJson.length > 0 && asksJson.length > 0) {
                            allPoints.push({ 
                                time, 
                                bids: bidsJson,
                                asks: asksJson,
                                bestBid,
                                bestAsk,
                                imbalance
                            });
                        }
                    } catch (e) {}
                }
            }

            if (allPoints.length === 0) throw new Error('No valid data');

            const points = allPoints.slice(-60);
            
            // Render stats
            if (points.length > 0) {
                const latest = points[points.length - 1];
                const statCards = [
                    { label: 'Best Bid', value: formatPrice(latest.bestBid), sub: 'highest buy order' },
                    { label: 'Best Ask', value: formatPrice(latest.bestAsk), sub: 'lowest sell order' },
                    { label: 'Spread', value: `$${(latest.bestAsk - latest.bestBid).toFixed(2)}`, sub: 'bid-ask spread' },
                    { label: 'Imbalance', value: latest.imbalance.toFixed(4), sub: 'bid vs ask ratio' },
                    { label: 'Bid Volume', value: latest.bids.reduce((a, b) => a + b.size, 0).toFixed(4), sub: 'total bid depth' },
                    { label: 'Ask Volume', value: latest.asks.reduce((a, b) => a + b.size, 0).toFixed(4), sub: 'total ask depth' }
                ];
                
                const grid = document.getElementById('stats-grid');
                statCards.forEach(stat => {
                    const div = document.createElement('div');
                    div.className = 'stat-card';
                    div.innerHTML = `<div class="stat-label">${stat.label}</div><div class="stat-value">${stat.value}</div><div class="stat-sub">${stat.sub}</div>`;
                    grid.appendChild(div);
                });
            }

            // Prepare data for order book chart
            const bidDatasets = [];
            const askDatasets = [];
            const maxDepth = 10;
            
            for (let depth = 0; depth < maxDepth; depth++) {
                const bidData = points.map((p, idx) => ({
                    x: p.time,
                    y: p.bids[depth]?.price || null,
                    r: (p.bids[depth]?.size || 0) * 100
                })).filter(d => d.y !== null);
                
                const askData = points.map((p, idx) => ({
                    x: p.time,
                    y: p.asks[depth]?.price || null,
                    r: (p.asks[depth]?.size || 0) * 100
                })).filter(d => d.y !== null);
                
                if (bidData.length > 0) {
                    bidDatasets.push({
                        label: `Bid L${depth + 1}`,
                        data: bidData,
                        backgroundColor: `rgba(9, 105, 218, ${0.3 + depth * 0.05})`,
                        borderColor: `rgba(9, 105, 218, 1)`,
                        borderWidth: 0,
                        pointRadius: 0
                    });
                }
                
                if (askData.length > 0) {
                    askDatasets.push({
                        label: `Ask L${depth + 1}`,
                        data: askData,
                        backgroundColor: `rgba(220, 53, 69, ${0.3 + depth * 0.05})`,
                        borderColor: `rgba(220, 53, 69, 1)`,
                        borderWidth: 0,
                        pointRadius: 0
                    });
                }
            }

            // Order book chart
            new Chart(document.getElementById('orderBookChart'), {
                type: 'bubble',
                data: {
                    datasets: [...bidDatasets, ...askDatasets]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'top', labels: { boxWidth: 6, font: { size: 10 }, padding: 8, usePointStyle: true } },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)} (${ctx.raw.r.toFixed(2)})`
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
                            ticks: { color: '#57606a', font: { size: 10 } },
                            grid: { color: '#d0d7de' }
                        },
                        y: {
                            ticks: { color: '#57606a', font: { size: 10 }, callback: v => formatPrice(v) },
                            grid: { color: '#d0d7de' }
                        }
                    }
                }
            });

            // Imbalance chart
            new Chart(document.getElementById('imbalanceChart'), {
                type: 'line',
                data: {
                    labels: points.map(p => p.time),
                    datasets: [{
                        label: 'Order Book Imbalance',
                        data: points.map(p => p.imbalance),
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => `Imbalance: ${ctx.parsed.y.toFixed(4)}` } }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
                            ticks: { color: '#57606a', font: { size: 10 } },
                            grid: { color: '#d0d7de' }
                        },
                        y: {
                            ticks: { color: '#57606a', font: { size: 10 } },
                            grid: { color: '#d0d7de' }
                        }
                    }
                }
            });
            
        } catch (error) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = 'Error: ' + error.message;
            errorDiv.style.display = 'block';
        }
    }
    init();
</script>
</body>
</html>
