<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Order Book Imbalance Dashboard - Ruming Liu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #24292f;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { margin-bottom: 30px; border-bottom: 1px solid #d0d7de; padding-bottom: 20px; }
        h1 { color: #0969da; font-size: 1.8em; margin-bottom: 10px; }
        .subtitle { color: #57606a; font-size: 0.95em; }
        .back-link { color: #0969da; text-decoration: none; font-size: 0.9em; margin-top: 10px; display: inline-block; }
        .back-link:hover { text-decoration: underline; }
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; }
        .stat-label { font-size: 12px; color: #57606a; margin-bottom: 6px; font-weight: 500; }
        .stat-value { font-size: 20px; font-weight: 600; color: #0969da; }
        .stat-sub { font-size: 11px; color: #57606a; margin-top: 4px; }
        .card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        .card-title { font-size: 13px; font-weight: 600; color: #57606a; margin-bottom: 12px; }
        .chart-wrapper { position: relative; height: 600px; }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        .error { color: #d1242f; background: #FFEBE9; padding: 12px; border-radius: 6px; margin: 20px 0; }
        footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #d0d7de; color: #57606a; font-size: 0.85em; }
        footer a { color: #0969da; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Bitcoin Order Book Imbalance</h1>
        <p class="subtitle">Last 60 minutes of order book depth visualization</p>
        <a href="/" class="back-link">&larr; Back to Home</a>
    </header>

    <div id="stats-grid" class="stats-grid"></div>

    <div class="card">
        <div class="card-title">Order Book Heatmap - Price vs Time (Last 60 Minutes)</div>
        <div class="chart-wrapper">
            <canvas id="imbalanceChart"></canvas>
        </div>
    </div>

    <div id="error" class="error" style="display: none;"></div>

    <footer>
        <p>Data source: <a href="https://github.com/ronming1303/Microstructure_Pipeline" target="_blank">Microstructure Pipeline</a></p>
    </footer>
</div>

<script>
    function formatPrice(price) {
        return '$' + Math.round(price).toLocaleString();
    }

    async function init() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${today}_btc_usd_d10.csv`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('Failed to fetch CSV data');
            
            const csvText = await response.text();
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) throw new Error('No data');

            const headerLine = lines[0].trim();
            const headers = [];
            let current = '';
            let inQuotes = false;
            for (let j = 0; j < headerLine.length; j++) {
                const char = headerLine[j];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { headers.push(current); current = ''; }
                else current += char;
            }
            headers.push(current.trim());
            
            const timeIndex = headers.findIndex(h => h.includes('collected_at_utc'));
            const bidsJsonIndex = headers.findIndex(h => h.includes('bids_json'));
            const asksJsonIndex = headers.findIndex(h => h.includes('asks_json'));
            const bestBidIndex = headers.findIndex(h => h.includes('best_bid'));
            const bestAskIndex = headers.findIndex(h => h.includes('best_ask'));
            const imbalanceIndex = headers.findIndex(h => h.includes('imbalance'));
            
            if (timeIndex === -1 || bidsJsonIndex === -1 || asksJsonIndex === -1) throw new Error('Missing required columns');

            const allPoints = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const fields = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    const nextChar = line[j + 1];
                    
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') {
                            current += '"';
                            j++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        fields.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                fields.push(current);
                
                if (fields.length > Math.max(timeIndex, bidsJsonIndex, asksJsonIndex)) {
                    try {
                        const time = new Date(fields[timeIndex].trim());
                        const bidsJson = JSON.parse(fields[bidsJsonIndex]);
                        const asksJson = JSON.parse(fields[asksJsonIndex]);
                        const bestBid = parseFloat(fields[bestBidIndex]);
                        const bestAsk = parseFloat(fields[bestAskIndex]);
                        const imbalance = parseFloat(fields[imbalanceIndex]) || 0;
                        
                        if (Array.isArray(bidsJson) && Array.isArray(asksJson) && bidsJson.length > 0 && asksJson.length > 0) {
                            allPoints.push({ 
                                time, 
                                bids: bidsJson,
                                asks: asksJson,
                                bestBid,
                                bestAsk,
                                imbalance
                            });
                        }
                    } catch (e) {
                        // Skip malformed JSON
                    }
                }
            }

            if (allPoints.length === 0) throw new Error('No valid data');

            const points = allPoints.slice(-60);
            
            // Render stats
            if (points.length > 0) {
                const latest = points[points.length - 1];
                const statCards = [
                    { label: 'Best Bid', value: formatPrice(latest.bestBid), sub: 'highest buy order' },
                    { label: 'Best Ask', value: formatPrice(latest.bestAsk), sub: 'lowest sell order' },
                    { label: 'Spread', value: `$${(latest.bestAsk - latest.bestBid).toFixed(2)}`, sub: 'bid-ask spread' },
                    { label: 'Imbalance', value: latest.imbalance.toFixed(4), sub: 'bid vs ask ratio' },
                    { label: 'Bid Volume', value: latest.bids.reduce((a, b) => a + b.size, 0).toFixed(4), sub: 'total bid depth' },
                    { label: 'Ask Volume', value: latest.asks.reduce((a, b) => a + b.size, 0).toFixed(4), sub: 'total ask depth' }
                ];
                
                const grid = document.getElementById('stats-grid');
                statCards.forEach(stat => {
                    const div = document.createElement('div');
                    div.className = 'stat-card';
                    div.innerHTML = `<div class="stat-label">${stat.label}</div><div class="stat-value">${stat.value}</div><div class="stat-sub">${stat.sub}</div>`;
                    grid.appendChild(div);
                });
            }

            // Draw heatmap
            const canvas = document.getElementById('imbalanceChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            // Find price range across all data
            const allPrices = [];
            points.forEach(p => {
                p.bids.forEach(b => allPrices.push(b.price));
                p.asks.forEach(a => allPrices.push(a.price));
            });
            const minPrice = Math.min(...allPrices);
            const maxPrice = Math.max(...allPrices);
            const priceRange = maxPrice - minPrice;
            
            // Find imbalance range
            const imbalances = points.map(p => p.imbalance);
            const maxImbalance = Math.max(...imbalances.map(Math.abs));
            
            const padding = { top: 30, bottom: 60, left: 80, right: 100 };
            const graphWidth = canvas.width - padding.left - padding.right;
            const graphHeight = canvas.height - padding.top - padding.bottom;
            
            // Draw background
            ctx.fillStyle = '#f6f8fa';
            ctx.fillRect(padding.left, padding.top, graphWidth, graphHeight);
            
            // Calculate size normalization
            let maxSize = 0;
            points.forEach(p => {
                p.bids.forEach(b => maxSize = Math.max(maxSize, b.size));
                p.asks.forEach(a => maxSize = Math.max(maxSize, a.size));
            });
            
            const colWidth = graphWidth / points.length;
            
            // Draw heatmap cells
            points.forEach((p, timeIdx) => {
                const x0 = padding.left + timeIdx * colWidth;
                
                // Draw Bids (blue)
                p.bids.forEach(bid => {
                    const y = padding.top + graphHeight * (maxPrice - bid.price) / priceRange;
                    const normalized = Math.min(bid.size / maxSize, 1);
                    const alpha = 0.15 + normalized * 0.85;
                    ctx.fillStyle = `rgba(9, 105, 218, ${alpha})`;
                    ctx.fillRect(x0, y, colWidth - 0.5, 1);
                });
                
                // Draw Asks (red)
                p.asks.forEach(ask => {
                    const y = padding.top + graphHeight * (maxPrice - ask.price) / priceRange;
                    const normalized = Math.min(ask.size / maxSize, 1);
                    const alpha = 0.15 + normalized * 0.85;
                    ctx.fillStyle = `rgba(220, 53, 69, ${alpha})`;
                    ctx.fillRect(x0, y, colWidth - 0.5, 1);
                });
            });
            
            // Draw axes
            ctx.strokeStyle = '#24292f';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding.left, padding.top);
            ctx.lineTo(padding.left, padding.top + graphHeight);
            ctx.lineTo(padding.left + graphWidth, padding.top + graphHeight);
            ctx.stroke();
            
            // Right axis for imbalance
            ctx.beginPath();
            ctx.moveTo(padding.left + graphWidth, padding.top);
            ctx.lineTo(padding.left + graphWidth, padding.top + graphHeight);
            ctx.stroke();
            
            // Draw Y-axis labels (prices) - left side
            ctx.fillStyle = '#57606a';
            ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI"';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 10; i++) {
                const price = minPrice + (priceRange / 10) * i;
                const y = padding.top + graphHeight * (maxPrice - price) / priceRange;
                ctx.fillText(formatPrice(price), padding.left - 10, y + 4);
                
                // Grid lines
                ctx.strokeStyle = '#e1e4e8';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(padding.left + graphWidth, y);
                ctx.stroke();
            }
            
            // Draw imbalance axis - right side
            ctx.fillStyle = '#6366f1';
            ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI"';
            ctx.textAlign = 'left';
            const imbalanceStep = maxImbalance / 5;
            for (let i = -5; i <= 5; i++) {
                const imbalanceVal = i * imbalanceStep;
                const y = padding.top + graphHeight / 2 - (imbalanceVal / maxImbalance) * (graphHeight / 2);
                ctx.fillText(imbalanceVal.toFixed(2), padding.left + graphWidth + 10, y + 4);
            }
            
            // Draw imbalance line - right side
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 2;
            ctx.beginPath();
            points.forEach((p, idx) => {
                const x = padding.left + idx * colWidth + colWidth / 2;
                const y = padding.top + graphHeight / 2 - (p.imbalance / maxImbalance) * (graphHeight / 2);
                if (idx === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.stroke();
            
            // Zero line for imbalance (middle)
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(padding.left + graphWidth, padding.top + graphHeight / 2);
            ctx.lineTo(padding.left + graphWidth + padding.right - 10, padding.top + graphHeight / 2);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // X-axis labels (time) - sparse
            ctx.fillStyle = '#57606a';
            ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI"';
            ctx.textAlign = 'center';
            const timeStep = Math.ceil(points.length / 8);
            for (let i = 0; i < points.length; i += timeStep) {
                const x = padding.left + i * colWidth + colWidth / 2;
                const timeStr = points[i].time.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                ctx.fillText(timeStr, x, canvas.height - 20);
            }
            
        } catch (error) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = 'Error: ' + error.message;
            errorDiv.style.display = 'block';
        }
    }
    init();
</script>
</body>
</html>
