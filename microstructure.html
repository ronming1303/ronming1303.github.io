<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Order Book Imbalance Dashboard - Ruming Liu</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #24292f;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 30px; border-bottom: 1px solid #d0d7de; padding-bottom: 20px; }
        h1 { color: #0969da; font-size: 1.8em; margin-bottom: 10px; }
        .subtitle { color: #57606a; font-size: 0.95em; }
        .back-link { color: #0969da; text-decoration: none; font-size: 0.9em; margin-top: 10px; display: inline-block; }
        .back-link:hover { text-decoration: underline; }
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; }
        .stat-label { font-size: 12px; color: #57606a; margin-bottom: 6px; font-weight: 500; }
        .stat-value { font-size: 20px; font-weight: 600; color: #0969da; }
        .stat-sub { font-size: 11px; color: #57606a; margin-top: 4px; }
        .card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        .card-title { font-size: 13px; font-weight: 600; color: #57606a; margin-bottom: 12px; }
        .chart-wrapper { position: relative; height: 500px; }
        .error { color: #d1242f; background: #FFEBE9; padding: 12px; border-radius: 6px; margin: 20px 0; }
        footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #d0d7de; color: #57606a; font-size: 0.85em; }
        footer a { color: #0969da; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Bitcoin Order Book Imbalance</h1>
        <p class="subtitle">Live minute-level order book depth imbalance data from Coinbase BTC/USD (top 10 levels)</p>
        <a href="https://ronming1303.github.io" class="back-link">← Back to homepage</a>
    </header>

    <div class="stats-grid" id="stats-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #57606a;">Loading data...</div>
    </div>

    <div class="card">
        <div class="card-title">Order Book Depth - Bids vs Asks (Last 60 Minutes)</div>
        <div class="chart-wrapper">
            <canvas id="imbalanceChart"></canvas>
        </div>
    </div>

    <div class="error" id="error" style="display: none;"></div>

    <footer>
        <p>Data source: <a href="https://github.com/ronming1303/Microstructure_Pipeline" target="_blank">Microstructure Pipeline</a> | Last updated: <span id="last-update">--</span></p>
    </footer>
</div>

<script>
    let chart = null;

    async function loadData() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${today}_btc_usd_d10.csv`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const csvText = await response.text();
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) throw new Error('CSV empty');

            const headerLine = lines[0].trim();
            const headers = [];
            let current = '';
            let inQuotes = false;
            for (let j = 0; j < headerLine.length; j++) {
                const char = headerLine[j];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { headers.push(current); current = ''; }
                else current += char;
            }
            headers.push(current.trim());
            
            const timeIndex = headers.findIndex(h => h.includes('collected_at_utc'));
            const bidsJsonIndex = headers.findIndex(h => h.includes('bids_json'));
            const asksJsonIndex = headers.findIndex(h => h.includes('asks_json'));
            const bestBidIndex = headers.findIndex(h => h.includes('best_bid'));
            const bestAskIndex = headers.findIndex(h => h.includes('best_ask'));
            
            if (timeIndex === -1 || bidsJsonIndex === -1 || asksJsonIndex === -1) {
                console.error('Headers:', headers);
                throw new Error('Missing columns - found indices: time=' + timeIndex + ', bids=' + bidsJsonIndex + ', asks=' + asksJsonIndex);
            }

            const allPoints = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                const fields = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { fields.push(current); current = ''; }
                    else current += char;
                }
                fields.push(current);
                
                if (fields.length > Math.max(timeIndex, bidsJsonIndex, asksJsonIndex)) {
                    const time = new Date(fields[timeIndex].trim());
                    try {
                        // CSV parser (quote-aware split) already gives us clean fields
                        const bidsJson = JSON.parse(fields[bidsJsonIndex]);
                        const asksJson = JSON.parse(fields[asksJsonIndex]);
                        
                        if (Array.isArray(bidsJson) && Array.isArray(asksJson) && bidsJson.length > 0 && asksJson.length > 0) {
                            allPoints.push({ 
                                time, 
                                bids: bidsJson.slice(0, 10),
                                asks: asksJson.slice(0, 10),
                                bestBid: parseFloat(fields[bestBidIndex] || bidsJson[0].price),
                                bestAsk: parseFloat(fields[bestAskIndex] || asksJson[0].price)
                            });
                        }
                    } catch (e) {
                        // Skip malformed JSON
                    }
                }
            }

            if (allPoints.length === 0) {
                console.log('Debug: total lines:', lines.length);
                console.log('Debug: headers length:', headers.length);
                console.log('Debug: timeIndex:', timeIndex, 'bidsIndex:', bidsJsonIndex, 'asksIndex:', asksJsonIndex);
                if (lines.length > 1) {
                    const testLine = lines[1];
                    const testFields = [];
                    let current = '';
                    let inQuotes = false;
                    for (let j = 0; j < testLine.length; j++) {
                        const char = testLine[j];
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { testFields.push(current); current = ''; }
                        else current += char;
                    }
                    testFields.push(current);
                    console.log('Debug: first data line fields:', testFields.length);
                    console.log('Debug: time field:', testFields[timeIndex]);
                    console.log('Debug: bids field (first 100):', testFields[bidsJsonIndex].substring(0, 100));
                }
                throw new Error('No data - debug info in console');
            }

            const points = allPoints.slice(-60);
            const latest = points[points.length - 1];
            
            // Extract all bid/ask levels for stats
            const allBidPrices = [];
            const allAskPrices = [];
            const allBidSizes = [];
            const allAskSizes = [];
            
            points.forEach(p => {
                p.bids.forEach(b => { allBidPrices.push(b.price); allBidSizes.push(b.size); });
                p.asks.forEach(a => { allAskPrices.push(a.price); allAskSizes.push(a.size); });
            });
            
            const latestBidSize = latest.bids.reduce((a, b) => a + b.size, 0);
            const latestAskSize = latest.asks.reduce((a, b) => a + b.size, 0);
            const spread = latest.bestAsk - latest.bestBid;

            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card"><div class="stat-label">Best Bid</div><div class="stat-value">$${latest.bestBid.toFixed(2)}</div><div class="stat-sub">Size: ${latestBidSize.toFixed(4)}</div></div>
                <div class="stat-card"><div class="stat-label">Best Ask</div><div class="stat-value">$${latest.bestAsk.toFixed(2)}</div><div class="stat-sub">Size: ${latestAskSize.toFixed(4)}</div></div>
                <div class="stat-card"><div class="stat-label">Spread</div><div class="stat-value">$${spread.toFixed(4)}</div><div class="stat-sub">bps: ${(spread / latest.bestBid * 10000).toFixed(1)}</div></div>
                <div class="stat-card"><div class="stat-label">Imbalance</div><div class="stat-value">${((latestBidSize - latestAskSize) / (latestBidSize + latestAskSize)).toFixed(4)}</div><div class="stat-sub">Ratio: ${(latestBidSize / latestAskSize).toFixed(2)}</div></div>
                <div class="stat-card"><div class="stat-label">Bid Depth</div><div class="stat-value">${latestBidSize.toFixed(3)}</div><div class="stat-sub">Ask: ${latestAskSize.toFixed(3)}</div></div>
                <div class="stat-card"><div class="stat-label">Updated</div><div class="stat-value" style="font-size: 14px;">${latest.time.toLocaleTimeString()}</div><div class="stat-sub">${latest.time.toLocaleDateString()}</div></div>
            `;
            document.getElementById('last-update').textContent = latest.time.toLocaleString();

            const ctx = document.getElementById('imbalanceChart').getContext('2d');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'bubble',
                data: {
                    datasets: [
                        {
                            label: 'Bid Orders',
                            data: (() => {
                                const bidData = [];
                                points.forEach(p => {
                                    p.bids.forEach(bid => {
                                        bidData.push({
                                            x: p.time,
                                            y: bid.price,
                                            r: Math.sqrt(bid.size) * 8,
                                            size: bid.size
                                        });
                                    });
                                });
                                return bidData;
                            })(),
                            backgroundColor: 'rgba(40, 167, 69, 0.5)',
                            borderColor: 'rgba(40, 167, 69, 0.8)',
                            borderWidth: 1
                        },
                        {
                            label: 'Ask Orders',
                            data: (() => {
                                const askData = [];
                                points.forEach(p => {
                                    p.asks.forEach(ask => {
                                        askData.push({
                                            x: p.time,
                                            y: ask.price,
                                            r: Math.sqrt(ask.size) * 8,
                                            size: ask.size
                                        });
                                    });
                                });
                                return askData;
                            })(),
                            backgroundColor: 'rgba(220, 53, 69, 0.5)',
                            borderColor: 'rgba(220, 53, 69, 0.8)',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'top' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `Price: $${context.raw.y.toFixed(2)}, Size: ${context.raw.size.toFixed(6)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
                            title: { display: true, text: 'Time' },
                            ticks: { color: '#57606a' },
                            grid: { color: '#d0d7de' }
                        },
                        y: {
                            title: { display: true, text: 'Price ($)' },
                            ticks: { color: '#57606a' },
                            grid: { color: '#d0d7de' }
                        }
                    }
                }
            });
            
            document.getElementById('error').style.display = 'none';

        } catch (error) {
            document.getElementById('error').textContent = 'Error: ' + error.message;
            document.getElementById('error').style.display = 'block';
            document.getElementById('stats-grid').innerHTML = '<div style="color: #d1242f; grid-column: 1/-1;">Failed to load</div>';
        }
    }

    loadData();
    setInterval(loadData, 60 * 1000);
</script>
</body>
</html>
