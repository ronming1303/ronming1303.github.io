<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Order Book Imbalance Dashboard - Ruming Liu</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #24292f;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 30px; border-bottom: 1px solid #d0d7de; padding-bottom: 20px; }
        h1 { color: #0969da; font-size: 1.8em; margin-bottom: 10px; }
        .subtitle { color: #57606a; font-size: 0.95em; }
        .back-link { color: #0969da; text-decoration: none; font-size: 0.9em; margin-top: 10px; display: inline-block; }
        .back-link:hover { text-decoration: underline; }
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; }
        .stat-label { font-size: 12px; color: #57606a; margin-bottom: 6px; font-weight: 500; }
        .stat-value { font-size: 20px; font-weight: 600; color: #0969da; }
        .stat-sub { font-size: 11px; color: #57606a; margin-top: 4px; }
        .card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        .card-title { font-size: 13px; font-weight: 600; color: #57606a; margin-bottom: 12px; }
        .chart-wrapper { position: relative; height: 350px; }
        .error { color: #d1242f; background: #FFEBE9; padding: 12px; border-radius: 6px; margin: 20px 0; }
        footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #d0d7de; color: #57606a; font-size: 0.85em; }
        footer a { color: #0969da; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Bitcoin Order Book Imbalance</h1>
        <p class="subtitle">Live minute-level order book depth imbalance data from Coinbase BTC/USD (top 10 levels)</p>
        <a href="https://ronming1303.github.io" class="back-link">← Back to homepage</a>
    </header>

    <div class="stats-grid" id="stats-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #57606a;">Loading data...</div>
    </div>

    <div class="card">
        <div class="card-title">Order Book Metrics (Last 60 Minutes)</div>
        <div class="chart-wrapper">
            <canvas id="imbalanceChart"></canvas>
        </div>
    </div>

    <div class="error" id="error" style="display: none;"></div>

    <footer>
        <p>Data source: <a href="https://github.com/ronming1303/Microstructure_Pipeline" target="_blank">Microstructure Pipeline</a> | Last updated: <span id="last-update">--</span></p>
    </footer>
</div>

<script>
    let chart = null;

    async function loadData() {
        try {
            const today = new Date().toISOString().split('T')[0];
            const csvUrl = `https://raw.githubusercontent.com/ronming1303/Microstructure_Pipeline/main/data/minute/${today}_btc_usd_d10.csv`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const csvText = await response.text();
            const lines = csvText.trim().split('\n');
            
            if (lines.length < 2) throw new Error('CSV empty');

            const headers = lines[0].split(',');
            const timeIndex = headers.indexOf('collected_at_utc');
            const bidVolumeIndex = headers.indexOf('bid_volume');
            const askVolumeIndex = headers.indexOf('ask_volume');
            const imbalanceIndex = headers.indexOf('imbalance');
            const bestBidIndex = headers.indexOf('best_bid');
            const bestAskIndex = headers.indexOf('best_ask');
            const midPriceIndex = headers.indexOf('mid_price');
            const spreadIndex = headers.indexOf('spread');
            const spreadBpsIndex = headers.indexOf('spread_bps');
            
            if (timeIndex === -1 || imbalanceIndex === -1 || bidVolumeIndex === -1 || askVolumeIndex === -1 || 
                bestBidIndex === -1 || bestAskIndex === -1 || midPriceIndex === -1) throw new Error('Missing columns');

            const allPoints = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                const fields = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { fields.push(current); current = ''; }
                    else current += char;
                }
                fields.push(current);
                
                if (fields.length > Math.max(timeIndex, imbalanceIndex, bidVolumeIndex, askVolumeIndex, bestBidIndex, bestAskIndex, midPriceIndex)) {
                    const time = new Date(fields[timeIndex].trim());
                    const bidVol = parseFloat(fields[bidVolumeIndex].trim());
                    const askVol = parseFloat(fields[askVolumeIndex].trim());
                    const imbalance = parseFloat(fields[imbalanceIndex].trim());
                    const bestBid = parseFloat(fields[bestBidIndex].trim());
                    const bestAsk = parseFloat(fields[bestAskIndex].trim());
                    const midPrice = parseFloat(fields[midPriceIndex].trim());
                    const spread = spreadIndex !== -1 ? parseFloat(fields[spreadIndex].trim()) : bestAsk - bestBid;
                    const spreadBps = spreadBpsIndex !== -1 ? parseFloat(fields[spreadBpsIndex].trim()) : 0;
                    
                    if (!isNaN(imbalance) && !isNaN(time.getTime()) && !isNaN(bidVol) && !isNaN(askVol) && !isNaN(bestBid) && !isNaN(bestAsk)) {
                        allPoints.push({ time, bidVol, askVol, imbalance, bestBid, bestAsk, midPrice, spread, spreadBps });
                    }
                }
            }

            if (allPoints.length === 0) throw new Error('No data');

            const points = allPoints.slice(-60);
            const latest = points[points.length - 1];
            
            const imbalances = points.map(p => p.imbalance);
            const bidVols = points.map(p => p.bidVol);
            const askVols = points.map(p => p.askVol);
            const spreads = points.map(p => p.spread);
            
            const mean = imbalances.reduce((a, b) => a + b, 0) / imbalances.length;
            const sorted = [...imbalances].sort((a, b) => a - b);
            const median = sorted.length % 2 === 0 ? (sorted[sorted.length / 2 - 1] + sorted[sorted.length / 2]) / 2 : sorted[Math.floor(sorted.length / 2)];

            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card"><div class="stat-label">Latest Imbalance</div><div class="stat-value">${latest.imbalance.toFixed(4)}</div><div class="stat-sub">Mean: ${mean.toFixed(4)}</div></div>
                <div class="stat-card"><div class="stat-label">Bid Volume</div><div class="stat-value">${latest.bidVol.toFixed(4)}</div><div class="stat-sub">Ask: ${latest.askVol.toFixed(4)}</div></div>
                <div class="stat-card"><div class="stat-label">Mid Price</div><div class="stat-value">$${latest.midPrice.toFixed(2)}</div><div class="stat-sub">Spread: ${latest.spread.toFixed(4)}</div></div>
                <div class="stat-card"><div class="stat-label">Best Bid</div><div class="stat-value">$${latest.bestBid.toFixed(2)}</div><div class="stat-sub">Ask: $${latest.bestAsk.toFixed(2)}</div></div>
                <div class="stat-card"><div class="stat-label">Spread bps</div><div class="stat-value">${(latest.spreadBps * 10000).toFixed(1)}</div><div class="stat-sub">Range: ${Math.min(...spreads).toFixed(4)} ~ ${Math.max(...spreads).toFixed(4)}</div></div>
                <div class="stat-card"><div class="stat-label">Updated</div><div class="stat-value" style="font-size: 14px;">${latest.time.toLocaleTimeString()}</div><div class="stat-sub">${latest.time.toLocaleDateString()}</div></div>
            `;
            document.getElementById('last-update').textContent = latest.time.toLocaleString();

            const ctx = document.getElementById('imbalanceChart').getContext('2d');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: points.map(p => p.time),
                    datasets: [
                        {
                            label: 'Bid Volume',
                            data: points.map(p => p.bidVol),
                            type: 'bar',
                            backgroundColor: 'rgba(40, 167, 69, 0.4)',
                            borderColor: 'rgba(40, 167, 69, 0.8)',
                            borderWidth: 0,
                            barThickness: 6,
                            yAxisID: 'y1'
                        },
                        {
                            label: 'Ask Volume',
                            data: points.map(p => p.askVol),
                            type: 'bar',
                            backgroundColor: 'rgba(220, 53, 69, 0.4)',
                            borderColor: 'rgba(220, 53, 69, 0.8)',
                            borderWidth: 0,
                            barThickness: 6,
                            yAxisID: 'y1'
                        },
                        {
                            label: 'Imbalance',
                            data: points.map(p => p.imbalance),
                            type: 'line',
                            borderColor: '#0969da',
                            backgroundColor: 'rgba(9, 105, 218, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.2,
                            yAxisID: 'y1'
                        },
                        {
                            label: 'Best Bid',
                            data: points.map(p => p.bestBid),
                            type: 'line',
                            borderColor: '#28a745',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.2,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Best Ask',
                            data: points.map(p => p.bestAsk),
                            type: 'line',
                            borderColor: '#dc3545',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.2,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Mid Price',
                            data: points.map(p => p.midPrice),
                            type: 'line',
                            borderColor: '#6f42c1',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.2,
                            yAxisID: 'y'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: true, position: 'top' } },
                    scales: {
                        x: { 
                            type: 'time', 
                            time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
                            grid: { display: true, drawBorder: true }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: 'Price ($)' },
                            grid: { color: '#d0d7de' },
                            ticks: { color: '#57606a' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: 'Volume / Imbalance' },
                            grid: { drawOnChartArea: false },
                            ticks: { color: '#57606a' }
                        }
                    }
                }
            });
            
            document.getElementById('error').style.display = 'none';

        } catch (error) {
            document.getElementById('error').textContent = 'Error: ' + error.message;
            document.getElementById('error').style.display = 'block';
            document.getElementById('stats-grid').innerHTML = '<div style="color: #d1242f; grid-column: 1/-1;">Failed to load</div>';
        }
    }

    loadData();
    setInterval(loadData, 60 * 1000);
</script>
</body>
</html>
