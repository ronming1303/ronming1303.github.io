<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTR Bitcoin Treasury Case Study Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #ffffff; }
        #scale-wrap {
            position: absolute;
            width: 1300px;
            height: 850px;
            transform-origin: top left;
        }
        #scale-wrap iframe { display: block; width: 1300px; height: 850px; border: none; }
    </style>
</head>
<body>
<div id="scale-wrap">
    <iframe src="mstr_casestudy_interactive.html" scrolling="no"></iframe>
</div>
<script>
    function fit() {
        var w = document.documentElement.clientWidth || 1300;
        // Scale to fill the full width (crops the bottom rather than letterboxing the sides) —
        // the click-through page shows the chart in full.
        var scale = w / 1300;
        var wrap = document.getElementById('scale-wrap');
        wrap.style.transform = 'scale(' + scale + ')';
        wrap.style.left = '0px';
        wrap.style.top = '0px';
    }
    window.addEventListener('resize', fit);
    fit();
</script>
</body>
</html>
